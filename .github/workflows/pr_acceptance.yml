# Run all tests as GitHub Actions
name: Acceptance Tests
on:
  push:
    branches:
      # A test branch for seeing if your tests will pass in your personal fork
      - test_me_github
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  acceptance:
    runs-on:
      - ubuntu-latest
    strategy:
      matrix:
        platform:
          - label: 'AlmaLinux 8'
            experimental: false
            nodeset: almalinux8
          - label: 'AlmaLinux 9'
            experimental: false
            nodeset: almalinux9
          - label: 'AlmaLinux 10'
            experimental: false
            nodeset: almalinux10
      fail-fast: false
    env:
      PUPPET_VERSION: '~> 8.0'
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: ensure entropy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rng-tools
          sudo systemctl start rng-tools
      - name: install bundler
        run: |
          gem install bundler
          bundle update
      - name: install docker
        run: |
          set -x
          sudo apt-get remove -y docker docker-engine docker.io containerd runc ||:
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https ca-certificates curl gnupg-agent software-properties-common
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
          sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
          sudo apt-get update -y
          sudo apt-cache gencaches
          sudo apt-get install -y docker-ce
          sudo systemctl start docker
      - name: beaker
        env:
          NODESET: ${{matrix.platform.nodeset}}
        run: bundle exec rake beaker:suites[default,$NODESET]
        continue-on-error: ${{matrix.platform.experimental}}
