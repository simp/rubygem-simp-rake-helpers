# Run all tests as GitHub Actions
name: Unit Tests
on:
  push:
    branches:
      # A test branch for seeing if your tests will pass in your personal fork
      - test_me_github
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  spec:
    runs-on:
      - ubuntu-latest
    strategy:
      matrix:
        puppet:
          - label: 'OpenVox 8.x (Ruby 3.2)'
            puppet_version: '~> 8.0'
            ruby_version: '3.2'
            experimental: false
          - label: 'OpenVox 8.x (Ruby 3.4)'
            puppet_version: '~> 8.0'
            ruby_version: '3.4'
            experimental: false
          # OpenVox 9 is unreleased; preview the future Ruby 4.0 / OpenVox 9
          # combo by running the OpenVox 8 gem on Ruby 4.0.
          - label: 'OpenVox 9.x preview (Ruby 4.0, OpenVox 8 gem)'
            puppet_version: '~> 8.0'
            ruby_version: '4.0'
            experimental: false
      fail-fast: false
    env:
      PUPPET_VERSION: '${{matrix.puppet.puppet_version}}'
    steps:
      - uses: actions/checkout@v7
      - name: 'Install Ruby ${{matrix.puppet.ruby_version}}'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{matrix.puppet.ruby_version}}
          bundler-cache: true
      - run: 'command -v rpm || if command -v apt-get; then sudo apt-get update; sudo apt-get install -y rpm; fi ||:'
      - run: 'bundle exec rake spec'
        continue-on-error: ${{matrix.puppet.experimental}}
      - name: gem build
        run: bundle exec rake pkg:install_gem
        continue-on-error: ${{matrix.puppet.experimental}}

  ruby-style:
    name: 'Ruby Style'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: 'Install Ruby 3.4'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.9'
          bundler-cache: true
      - run: bundle exec rubocop
