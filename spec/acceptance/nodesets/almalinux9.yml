---
HOSTS:
  el9-build-server:
    roles:
      - default
      - build_server
    platform: el-9-x86_64
    hypervisor: docker
    image: almalinux:9
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'dnf -y group install rpm-development-tools development'
      - 'dnf -y install openssh-server rsync gnupg2 pinentry-curses procps-ng'
      - 'dnf -y install ruby ruby-devel rubygems'
      - 'gpg --keyserver keyserver.ubuntu.com --recv-keys 409B6B1796C275462A1703113804BB82D39DC0E3 7D2BAF1CF37B13E2069D6956105BD0E739499BDB'
      - 'curl -sSL https://get.rvm.io | bash -s stable'
      - '/bin/bash --login -c "rvm install ruby && rvm use ruby --default && gem install bundler"'
      - 'echo "rvm_silence_path_mismatch_check_flag=1" > /etc/profile.d/00_rvm_silence.sh'
      - 'useradd -m build_user'
      - 'usermod -aG rvm build_user'
      - 'echo "[[ -s /usr/local/rvm/scripts/rvm ]] && source /usr/local/rvm/scripts/rvm && rvm use default" >> /home/build_user/.bash_profile'
      - 'echo "root:root" | chpasswd'
      - 'sed -i "s/^#\?PermitRootLogin.*/PermitRootLogin yes/" /etc/ssh/sshd_config'
      - 'sed -i "s/^#\?PasswordAuthentication.*/PasswordAuthentication yes/" /etc/ssh/sshd_config'
      - 'ssh-keygen -A'
      - 'systemctl enable sshd'

CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'puppet8') %>"
  ssh:
    password: root
    auth_methods:
      - password
  docker_preserve_image: true
  mount_folders:
    host_files:
      host_path: ./
      container_path: /host_files
